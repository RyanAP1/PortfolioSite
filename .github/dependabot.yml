version: 2
updates:
  # npm dependencies for the Astro site
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "astro"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "tailwindcss"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "deps(npm):"

  # Terraform provider dependencies
  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "deps(terraform):"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(actions):"
